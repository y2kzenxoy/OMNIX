openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: openai
    description: OpenAI AI chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /openai/chat:
    post:
      operationId: openaiChat
      tags: [openai]
      summary: Chat with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiChatRequest"
      responses:
        "200":
          description: AI response (SSE stream)
          content:
            text/event-stream:
              schema:
                type: string
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OpenaiChatRequest:
      type: object
      properties:
        prompt:
          type: string
        system:
          type: string
        agentId:
          type: string
      required:
        - prompt
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
