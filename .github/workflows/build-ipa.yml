name: Build OMNIX IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup clean project
        run: |
          mkdir -p /tmp/omnix/src /tmp/omnix/public

          # Create package.json
          cat > /tmp/omnix/package.json << 'EOF'
          {
            "name": "omnix",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "react": "^18.2.0",
              "react-dom": "^18.2.0",
              "react-scripts": "5.0.1",
              "@capacitor/core": "^5.0.0",
              "@capacitor/ios": "^5.0.0"
            },
            "scripts": { "build": "react-scripts build" },
            "browserslist": { "production": [">0.2%"] }
          }
          EOF

          # Create index.html
          cat > /tmp/omnix/public/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="utf-8"/>
              <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
              <meta name="apple-mobile-web-app-capable" content="yes"/>
              <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
              <title>OMNIX</title>
              <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#e2e8f0}</style>
            </head>
            <body><div id="root"></div></body>
          </html>
          EOF

          # Create index.js
          cat > /tmp/omnix/src/index.js << 'EOF'
          import React from 'react';
          import ReactDOM from 'react-dom/client';
          import App from './App';
          ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
          EOF

          # Copy OMNIX app file if it exists
          if [ -f src/App.jsx ]; then
            cp src/App.jsx /tmp/omnix/src/App.jsx
          elif [ -f src/App.js ]; then
            cp src/App.js /tmp/omnix/src/App.jsx
          else
            echo "App file not found, searching..."
            find . -name "App.jsx" -o -name "App.js" | head -1 | xargs -I{} cp {} /tmp/omnix/src/App.jsx
          fi

          # Capacitor config
          cat > /tmp/omnix/capacitor.config.json << 'EOF'
          {
            "appId": "com.omnix.agent",
            "appName": "OMNIX",
            "webDir": "build",
            "ios": { "scheme": "OMNIX", "backgroundColor": "#000000" }
          }
          EOF

      - name: Build React app
        working-directory: /tmp/omnix
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Setup Capacitor
        working-directory: /tmp/omnix
        run: |
          npm install -g @capacitor/cli
          npx cap add ios || true
          npx cap sync ios

      - name: Pod install
        working-directory: /tmp/omnix
        run: cd ios/App && pod install

      - name: Build IPA
        working-directory: /tmp/omnix
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO
          mkdir -p build/IPA/Payload
          cp -r build/App.xcarchive/Products/Applications/App.app build/IPA/Payload/
          cd build/IPA && zip -r OMNIX.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: OMNIX-IPA
          path: /tmp/omnix/build/IPA/OMNIX.ipa
          retention-days: 30
