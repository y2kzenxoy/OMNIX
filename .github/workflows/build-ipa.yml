name: Build OMNIX IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup clean Vite project
        run: |
          mkdir -p /tmp/omnix/src /tmp/omnix/public

          cat > /tmp/omnix/package.json << 'EOF'
          {
            "name": "omnix",
            "version": "1.0.0",
            "private": true,
            "type": "module",
            "scripts": { "build": "vite build" },
            "dependencies": {
              "react": "^18.2.0",
              "react-dom": "^18.2.0",
              "@capacitor/core": "^5.0.0",
              "@capacitor/ios": "^5.0.0"
            },
            "devDependencies": {
              "vite": "^5.0.0",
              "@vitejs/plugin-react": "^4.0.0"
            }
          }
          EOF

          cat > /tmp/omnix/vite.config.js << 'EOF'
          import { defineConfig } from 'vite'
          import react from '@vitejs/plugin-react'
          export default defineConfig({
            plugins: [react()],
            build: { outDir: 'dist' }
          })
          EOF

          cat > /tmp/omnix/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="utf-8"/>
              <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
              <meta name="apple-mobile-web-app-capable" content="yes"/>
              <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
              <title>OMNIX</title>
              <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#e2e8f0}</style>
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="/src/main.jsx"></script>
            </body>
          </html>
          EOF

          cat > /tmp/omnix/src/main.jsx << 'EOF'
          import React from 'react'
          import ReactDOM from 'react-dom/client'
          import App from './App'
          ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
          EOF

          # Copy App file
          if [ -f src/App.jsx ]; then
            cp src/App.jsx /tmp/omnix/src/App.jsx
          else
            find . -name "App.jsx" | head -1 | xargs -I{} cp {} /tmp/omnix/src/App.jsx 2>/dev/null || true
          fi

          cat > /tmp/omnix/capacitor.config.json << 'EOF'
          {
            "appId": "com.omnix.agent",
            "appName": "OMNIX",
            "webDir": "dist",
            "ios": { "scheme": "OMNIX", "backgroundColor": "#000000" }
          }
          EOF

      - name: Build with Vite
        working-directory: /tmp/omnix
        run: |
          npm install
          npm run build

      - name: Setup Capacitor
        working-directory: /tmp/omnix
        run: |
          npm install -g @capacitor/cli
          npx cap add ios || true
          npx cap sync ios

      - name: Pod install
        working-directory: /tmp/omnix
        run: cd ios/App && pod install

      - name: Build IPA
        working-directory: /tmp/omnix
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO
          mkdir -p build/IPA/Payload
          cp -r build/App.xcarchive/Products/Applications/App.app build/IPA/Payload/
          cd build/IPA && zip -r OMNIX.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: OMNIX-IPA
          path: /tmp/omnix/build/IPA/OMNIX.ipa
          retention-days: 30
